<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{business_name}}</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="--theme: {{theme_color}};">
  <header>
    <img src="{{logo_src}}" alt="{{business_name}} logo" class="logo">
    <h1>{{business_name}}</h1>
    <p>{{description}}</p>
  </header>

  <section>
    <h2>About</h2>
    <p>{{description}}</p>
  </section>

  <section>
    <h2>Services</h2>
    <ul>{{services_list}}</ul>
  </section>

  <section>
    <h2>Contact</h2>
    <p>Phone: {{phone}}</p>
    <p>Location: {{location}}</p>
    <a href="https://wa.me/{{whatsapp}}" class="wa-btn" target="_blank" rel="noopener">Chat on WhatsApp</a>
  </section>

  <section>
    <h2>Find Us</h2>
    <iframe src="https://maps.google.com/maps?q={{map_query}}&output=embed"></iframe>
  </section>
</body>
</html>
