<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{business_name}} - Welcome</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="--theme: {{theme_color}};">
  <section class="hero">
    <div class="overlay">
      <img src="{{logo_src}}" alt="{{business_name}} logo" class="logo">
      <h1>{{business_name}}</h1>
      <p>{{description}}</p>
      <a href="https://wa.me/{{whatsapp}}" class="wa-btn" target="_blank" rel="noopener">WhatsApp Us</a>
    </div>
  </section>

  <section class="content">
    <h2>About</h2>
    <p>{{description}}</p>

    <h2>Services</h2>
    <ul>{{services_list}}</ul>

    <h2>Contact</h2>
    <p>{{phone}} | {{location}}</p>

    <h2>Google Map</h2>
    <iframe src="https://maps.google.com/maps?q={{map_query}}&output=embed"></iframe>
  </section>
</body>
</html>
