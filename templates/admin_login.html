<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - SnapSite</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
</head>
<body>
  <main class="container page">
    <div class="card" style="max-width: 460px; margin: 4rem auto;">
      <h1>Admin Login</h1>
      <p>Enter the admin password to manage payments and generated sites.</p>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, msg in messages %}
            <div class="flash {{ category }}">{{ msg }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}
      <form class="form" action="{{ url_for('admin_login') }}" method="POST">
        <label>
          Password
          <input type="password" name="password" required />
        </label>
        <button class="btn" type="submit">Login</button>
      </form>
    </div>
  </main>
</body>
</html>
