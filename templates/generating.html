<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generating Website - SnapSite</title>
  <link rel="icon" href="{{ url_for('static', filename='brand/favicon.ico') }}" sizes="any" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
  <style>
    .generating-shell {
      min-height: 70vh;
      display: grid;
      place-items: center;
    }
    .generating-card {
      max-width: 560px;
      text-align: center;
      padding: 2.25rem;
    }
    .pulse {
      width: 60px;
      height: 60px;
      margin: 0 auto 1rem;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(15, 118, 110, 0.95), rgba(15, 118, 110, 0.18));
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(0.9); opacity: 0.7; }
      50% { transform: scale(1.1); opacity: 1; }
    }
  </style>
</head>
<body>
  <main class="container generating-shell page-shell narrow-page">
    <div class="card generating-card">
      <div class="pulse" aria-hidden="true"></div>
      <h1>Building your website. This may take 15-20 seconds.</h1>
      <p>SnapSite is generating your business website, preparing the preview, and checking whether Netlify auto-deployment is available.</p>
    </div>
  </main>

  <form id="process-generation" action="{{ url_for('process_generation') }}" method="POST"></form>
  <script>
    window.addEventListener("load", function () {
      document.getElementById("process-generation").submit();
    });
  </script>
</body>
</html>
